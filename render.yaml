services:
  # 1. The Node.js Backend Service
  - type: web
    name: smart-expense-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5002
      - key: JWT_SECRET
        generateValue: true

  # 2. The React Frontend Static Site
  - type: web
    name: smart-expense-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    # Render static sites need to fallback to index.html for React Router to work
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # This tells your frontend to talk to your new Render backend!
      - key: VITE_API_URL
        fromService:
          type: web
          name: smart-expense-backend
          envVarKey: RENDER_EXTERNAL_URL
